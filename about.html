<!DOCTYPE html>
<html>
<head>
  <title>About Benkees</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #1f3b2d 0%, #0b0b0b 45%, #000000 100%);
      color: white;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px 80px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 48px;
    }

    .flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
    }

    .text {
      flex: 1;
      font-size: 20px;
      line-height: 1.8;
    }

    .img {
      flex: 0 0 180px;
    }

    .img img {
      width: 100%;
    }

    .back {
      text-align: center;
      margin-top: 60px;
    }

    .back a {
      color: white;
      font-size: 20px;
    }

    @media (max-width: 800px) {
      .flex {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>About Benkees</h1>

    <div class="flex">
      <div class="text">
        Benkees is a strange group of characters living somewhere around "North Station".<br>
        They may look unusual, but each of them quietly lives their own ordinary life.
      </div>

      <div class="img">
        <img src="sakura.png">
      </div>
    </div>

    <div class="back">
      <a href="index.html">Back to Home</a>
    </div>
  </div>
</body>
</html>
